<div class="h-[calc(100vh-80px)] flex bg-background dark:bg-gray-950 overflow-hidden">

    <!-- Left Sidebar: Conversations List -->
    <div
        class="w-80 lg:w-96 flex-shrink-0 border-r border-border dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl flex flex-col">
        <div class="p-6 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-primary dark:text-white font-sora tracking-tight">Messages</h1>
            <button (click)="openCreateModal()"
                class="p-3 bg-primary hover:bg-primary-dark text-white rounded-2xl shadow-lg shadow-primary-soft dark:shadow-none transition-all transform active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto">
            <app-messages-list></app-messages-list>
        </div>
    </div>

    <!-- Main Content: Chat View -->
    <div class="flex-1 flex flex-col relative bg-background/50 dark:bg-black/20">
        <router-outlet></router-outlet>

        <!-- Empty State (when no conversation selected) -->
        <div *ngIf="!outlet.isActivated"
            class="flex-1 flex flex-col items-center justify-center p-12 text-center space-y-4 animate-in fade-in zoom-in duration-500">
            <div
                class="w-24 h-24 bg-primary-light dark:bg-indigo-900/20 rounded-full flex items-center justify-center text-primary">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-primary dark:text-white font-sora">Sélectionnez une discussion</h2>
            <p class="text-secondary max-w-xs">Choisissez une conversation dans la liste ou commencez-en une nouvelle
                pour échanger avec vos collègues.</p>
        </div>
    </div>

    <!-- Modal Creation -->
    <app-create-conversation *ngIf="showCreateModal()" (onClose)="closeCreateModal()"
        (onCreated)="onConversationCreated($event)">
    </app-create-conversation>

</div>

<router-outlet #outlet="outlet" class="hidden"></router-outlet>
